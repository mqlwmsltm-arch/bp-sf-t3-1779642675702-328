		/* RESET */
		*, *::before, *::after {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		html {
			scroll-behavior: smooth;
			font-size: 16px;
		}

		body {
			font-family: 'Roboto Mono', 'Courier New', monospace;
			background-color: #0b0b0b;
			color: #f0f0f0;
			line-height: 1.6;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
		}

		/* ========== TYPOGRAPHY ========== */
		h1 {
			font-size: 2.8rem;
			font-weight: 900;
			text-transform: uppercase;
			letter-spacing: 0.15em;
			color: #ff3366;
			text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366;
			margin-bottom: 1rem;
			line-height: 1.1;
		}

		h2 {
			font-size: 2rem;
			font-weight: 700;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			color: #ff3366;
			margin-bottom: 1.5rem;
			border-left: 6px solid #ff3366;
			padding-left: 1rem;
		}

		h3 {
			font-size: 1.4rem;
			font-weight: 600;
			color: #f0f0f0;
			margin-bottom: 0.75rem;
		}

		p, li, blockquote {
			font-size: 1.1rem;
			color: #c0c0c0;
			margin-bottom: 1.2rem;
		}

		a {
			color: #ff3366;
			text-decoration: none;
			font-weight: 600;
			transition: color 0.2s, text-shadow 0.2s;
		}

		a:hover, a:focus {
			color: #ffffff;
			text-shadow: 0 0 8px #ff3366;
		}

		strong, b {
			color: #ffffff;
			font-weight: 700;
		}

		/* ========== LAYOUT ========== */
		.container {
			max-width: 1200px;
			margin: 0 auto;
			padding: 0 1.5rem;
		}

		.section-gap {
			padding: 4rem 0;
		}

		/* ========== HEADER / NAV ========== */
		header {
			background: #111;
			border-bottom: 2px solid #ff3366;
			position: sticky;
			top: 0;
			z-index: 100;
		}

		nav {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 1.2rem 1.5rem;
			max-width: 1200px;
			margin: 0 auto;
		}

		.logo {
			font-size: 1.8rem;
			font-weight: 900;
			color: #ff3366;
			text-transform: uppercase;
			letter-spacing: 0.2em;
			text-shadow: 0 0 10px #ff3366;
		}

		.nav-links {
			display: flex;
			gap: 2rem;
			list-style: none;
		}

		.nav-links a {
			font-size: 1rem;
			padding: 0.5rem 0;
			position: relative;
		}

		.nav-links a::after {
			content: '';
			display: block;
			width: 0;
			height: 2px;
			background: #ff3366;
			transition: width 0.3s;
			margin-top: 0.2rem;
		}

		.nav-links a:hover::after,
		.nav-links a.active::after {
			width: 100%;
		}

		.nav-links a.active {
			color: #ffffff;
			text-shadow: 0 0 10px #ff3366;
		}

		.tel-link {
			display: inline-block;
			background: #ff3366;
			color: #0b0b0b;
			font-weight: 800;
			padding: 0.6rem 1.2rem;
			border-radius: 0;
			font-size: 1.1rem;
			transition: background 0.3s, color 0.3s;
			text-shadow: none;
		}

		.tel-link:hover {
			background: #ffffff;
			color: #0b0b0b;
		}

		/* hamburger menu */
		.hamburger {
			display: none;
			flex-direction: column;
			gap: 5px;
			cursor: pointer;
			background: none;
			border: none;
			padding: 0.5rem;
		}

		.hamburger span {
			display: block;
			width: 28px;
			height: 3px;
			background: #ff3366;
			transition: all 0.3s;
		}

		/* ========== MAIN CONTENT ========== */
		.blog-post {
			background: #111;
			padding: 3rem 2rem;
			border: 1px solid #ff3366;
			box-shadow: 0 0 30px rgba(255, 51, 102, 0.15);
		}

		.blog-post .meta {
			font-size: 0.9rem;
			color: #888;
			margin-bottom: 2rem;
			text-transform: uppercase;
			letter-spacing: 0.1em;
		}

		.blog-post blockquote {
			border-left: 4px solid #ff3366;
			padding-left: 1.5rem;
			font-style: italic;
			color: #ffa0b0;
			margin: 2rem 0;
		}

		.blog-post .highlight {
			background: #1a1a1a;
			padding: 1.5rem;
			border: 1px solid #ff3366;
			margin: 2rem 0;
		}

		.blog-post .btn {
			display: inline-block;
			background: #ff3366;
			color: #0b0b0b;
			font-weight: 800;
			padding: 1rem 2rem;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			border: none;
			cursor: pointer;
			transition: background 0.3s, color 0.3s;
			font-size: 1.1rem;
		}

		.blog-post .btn:hover {
			background: #ffffff;
			color: #0b0b0b;
		}

		/* ========== FAQ ========== */
		.faq-list {
			display: flex;
			flex-direction: column;
			gap: 1.5rem;
		}

		.faq-item {
			background: #151515;
			padding: 1.5rem;
			border: 1px solid #333;
			transition: border-color 0.3s;
		}
